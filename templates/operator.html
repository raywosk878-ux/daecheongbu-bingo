<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대청부 빙고 — 운영자</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --card: #16213e;
    --accent: #e94560;
    --gold: #f5a623;
    --teal: #0f9b8e;
    --text: #eaeaea;
    --muted: #888;
    --cleared: #2a2a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: auto 1fr;
    gap: 0;
  }

  /* ── 헤더 ── */
  header {
    grid-column: 1 / -1;
    background: var(--surface);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--accent);
  }
  header h1 { font-size: 1.3rem; font-weight: 900; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .header-info { display: flex; gap: 20px; align-items: center; }
  .player-count {
    background: var(--accent);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 700;
  }
  .btn-reset {
    background: transparent;
    border: 1px solid var(--muted);
    color: var(--muted);
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

  /* ── 메인 영역 ── */
  main {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }

  /* ── 빙고판 ── */
  .bingo-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    max-width: 480px;
  }
  .bingo-cell {
    aspect-ratio: 1;
    background: var(--card);
    border: 2px solid #2a2a4a;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    font-weight: 700;
    font-size: 1.3rem;
  }
  .bingo-cell:hover:not(.cleared):not(.active) {
    border-color: var(--teal);
    background: #1a2a3a;
    transform: scale(1.05);
  }
  .bingo-cell.active {
    border-color: var(--gold);
    background: #2a1a00;
    box-shadow: 0 0 18px rgba(245,166,35,0.4);
    animation: pulse 1.4s infinite;
  }
  .bingo-cell.cleared {
    background: var(--cleared);
    border-color: #333;
    color: var(--muted);
    cursor: default;
    text-decoration: line-through;
  }
  .bingo-cell .type-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    position: absolute;
    top: 6px; right: 6px;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 18px rgba(245,166,35,0.4); }
    50% { box-shadow: 0 0 30px rgba(245,166,35,0.8); }
  }

  /* ── 질문 카드 ── */
  .question-card {
    background: var(--card);
    border: 2px solid var(--gold);
    border-radius: 14px;
    padding: 22px 26px;
    max-width: 600px;
    display: none;
  }
  .question-card.visible { display: block; }
  .q-label {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .q-num { font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
  .q-text {
    font-size: 1.5rem;
    font-weight: 900;
    line-height: 1.4;
    margin-bottom: 16px;
  }
  .q-answer {
    font-size: 0.9rem;
    color: var(--teal);
    margin-bottom: 16px;
    display: none;
  }
  .q-answer.visible { display: block; }

  /* VS 보기 */
  .vs-display {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  .vs-bar {
    flex: 1;
    background: #2a2a4a;
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .vs-bar .opt-name { font-weight: 700; font-size: 1rem; }
  .vs-bar .opt-count { font-size: 1.8rem; font-weight: 900; color: var(--accent); }
  .vs-bar.winner { border: 2px solid var(--gold); background: #2a1a00; }

  .btn-clear {
    background: var(--accent);
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-clear:hover { opacity: 0.85; }

  /* ── 답변 피드 ── */
  .answer-feed {
    background: var(--card);
    border-radius: 12px;
    padding: 16px;
    max-width: 600px;
    max-height: 220px;
    overflow-y: auto;
    display: none;
  }
  .answer-feed.visible { display: block; }
  .answer-feed h3 { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; letter-spacing: 1px; }
  .answer-item {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #2a2a4a;
    animation: fadeIn 0.3s ease;
  }
  .answer-item:last-child { border-bottom: none; }
  .answer-name { color: var(--gold); font-weight: 700; font-size: 0.88rem; min-width: 60px; }
  .answer-text { font-size: 0.95rem; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

  /* ── 사이드바 ── */
  aside {
    background: var(--surface);
    border-left: 1px solid #2a2a4a;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }
  aside h2 { font-size: 0.78rem; color: var(--muted); letter-spacing: 1.5px; margin-bottom: 10px; }

  /* 참여자 목록 */
  .player-list { display: flex; flex-direction: column; gap: 6px; }
  .player-item {
    background: var(--card);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.88rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .player-dot {
    width: 8px; height: 8px;
    background: var(--teal);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* 스코어보드 */
  .score-list { display: flex; flex-direction: column; gap: 6px; }
  .score-item {
    background: var(--card);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.88rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.3s;
  }
  .score-item.lowest { border-left: 3px solid var(--accent); }
  .score-badge {
    background: var(--teal);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.78rem;
    font-weight: 700;
  }

  /* 빙고 알림 */
  .bingo-toast {
    position: fixed;
    top: 80px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--gold);
    color: #000;
    padding: 14px 32px;
    border-radius: 12px;
    font-weight: 900;
    font-size: 1.2rem;
    opacity: 0;
    transition: all 0.4s;
    pointer-events: none;
    z-index: 999;
  }
  .bingo-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* 타입별 색상 */
  .dot-quiz   { background: #4ecdc4; }
  .dot-choice { background: #a8e6cf; }
  .dot-open   { background: #ffd93d; }
  .dot-deep   { background: #ff6b9d; }
  .dot-vs     { background: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>대청부 빙고 <span>운영자</span></h1>
  <div class="header-info">
    <div class="player-count">접속 <span id="playerCount">0</span>명</div>
    <button class="btn-reset" onclick="resetGame()">게임 초기화</button>
  </div>
</header>

<main>
  <!-- 빙고판 -->
  <div class="bingo-grid" id="bingoGrid"></div>

  <!-- 현재 질문 카드 -->
  <div class="question-card" id="questionCard">
    <div class="q-label" id="qLabel"></div>
    <div class="q-num" id="qNum"></div>
    <div class="q-text" id="qText"></div>
    <div class="q-answer" id="qAnswer"></div>
    <div class="vs-display" id="vsDisplay" style="display:none"></div>
    <button class="btn-clear" id="btnClear" onclick="clearCurrent()">✓ 이 번호 지우기</button>
  </div>

  <!-- 답변 피드 -->
  <div class="answer-feed" id="answerFeed">
    <h3>LIVE 답변</h3>
    <div id="answerList"></div>
  </div>
</main>

<aside>
  <div>
    <h2>접속 중인 참여자</h2>
    <div class="player-list" id="playerList"></div>
  </div>
  <div>
    <h2>스코어보드</h2>
    <div class="score-list" id="scoreList"></div>
  </div>
</aside>

<div class="bingo-toast" id="bingoToast"></div>

<script>
const socket = io();
const QUESTIONS = {{ questions | tojson }};
const TYPE_LABELS = {{ type_labels | tojson }};
const TYPE_DOTS = {
  quiz: 'dot-quiz', choice: 'dot-choice',
  open: 'dot-open', deep: 'dot-deep', vs: 'dot-vs'
};

let currentNum = null;
let clearedNums = new Set();
let vsVotes = {};

// ── 빙고판 생성 ──
function buildGrid() {
  const grid = document.getElementById('bingoGrid');
  grid.innerHTML = '';
  for (let n = 1; n <= 25; n++) {
    const q = QUESTIONS[n];
    const cell = document.createElement('div');
    cell.className = 'bingo-cell';
    cell.id = `cell-${n}`;
    cell.innerHTML = `
      <div class="type-dot ${TYPE_DOTS[q.type]}"></div>
      ${n}
    `;
    cell.onclick = () => openQuestion(n);
    grid.appendChild(cell);
  }
}

function openQuestion(num) {
  if (clearedNums.has(num)) return;
  currentNum = num;
  socket.emit('open_question', { num });
}

function showQuestion(num, q) {
  const card = document.getElementById('questionCard');
  card.classList.add('visible');
  document.getElementById('qLabel').textContent = TYPE_LABELS[q.type];
  document.getElementById('qNum').textContent = `#${num}번`;
  document.getElementById('qText').textContent = q.text;

  const ansEl = document.getElementById('qAnswer');
  if (q.answer) {
    ansEl.textContent = `정답: ${q.answer}`;
    ansEl.classList.add('visible');
  } else {
    ansEl.classList.remove('visible');
  }

  // VS 초기화
  const vsEl = document.getElementById('vsDisplay');
  vsVotes = {};
  if (q.type === 'vs' || q.type === 'choice') {
    vsEl.style.display = 'flex';
    renderVs(q.options, {});
  } else {
    vsEl.style.display = 'none';
  }

  // 답변 피드 초기화
  document.getElementById('answerList').innerHTML = '';
  document.getElementById('answerFeed').classList.add('visible');

  // 활성 셀 표시
  document.querySelectorAll('.bingo-cell').forEach(c => c.classList.remove('active'));
  document.getElementById(`cell-${num}`)?.classList.add('active');
}

function renderVs(options, counts) {
  const vsEl = document.getElementById('vsDisplay');
  const total = Object.values(counts).reduce((a,b) => a+b, 0);
  const maxCount = Math.max(...Object.values(counts), 0);
  vsEl.innerHTML = options.map(opt => {
    const cnt = counts[opt] || 0;
    const isWinner = cnt > 0 && cnt === maxCount;
    return `<div class="vs-bar ${isWinner ? 'winner' : ''}">
      <div class="opt-count">${cnt}</div>
      <div class="opt-name">${opt}</div>
    </div>`;
  }).join('<div style="display:flex;align-items:center;font-weight:900;font-size:1.2rem;color:var(--muted)">VS</div>');
}

function clearCurrent() {
  if (!currentNum) return;
  socket.emit('clear_number', { num: currentNum });
}

function resetGame() {
  if (confirm('게임을 초기화할까요? 모든 참여자가 나가게 됩니다.')) {
    socket.emit('reset_game');
  }
}

// ── 소켓 이벤트 ──
socket.on('question_opened', ({ num, question, type_label }) => {
  currentNum = num;
  showQuestion(num, question);
});

socket.on('new_answer', ({ name, text }) => {
  const list = document.getElementById('answerList');
  const item = document.createElement('div');
  item.className = 'answer-item';
  item.innerHTML = `<span class="answer-name">${name}</span><span class="answer-text">${text}</span>`;
  list.prepend(item);
});

socket.on('vs_result', ({ votes, voter, choice }) => {
  vsVotes = votes;
  const q = QUESTIONS[currentNum];
  if (q && (q.type === 'vs' || q.type === 'choice')) {
    renderVs(q.options, votes);
  }
  // 답변 피드에도 표시
  const list = document.getElementById('answerList');
  const item = document.createElement('div');
  item.className = 'answer-item';
  item.innerHTML = `<span class="answer-name">${voter}</span><span class="answer-text">→ ${choice}</span>`;
  list.prepend(item);
});

socket.on('number_cleared', ({ num }) => {
  clearedNums.add(num);
  const cell = document.getElementById(`cell-${num}`);
  if (cell) {
    cell.classList.remove('active');
    cell.classList.add('cleared');
  }
  currentNum = null;
  document.getElementById('questionCard').classList.remove('visible');
  document.getElementById('answerFeed').classList.remove('visible');
});

socket.on('player_list', (players) => {
  document.getElementById('playerCount').textContent = players.length;
  const list = document.getElementById('playerList');
  list.innerHTML = players.map(p =>
    `<div class="player-item"><div class="player-dot"></div>${p.name}</div>`
  ).join('');
});

socket.on('scoreboard', (scores) => {
  const list = document.getElementById('scoreList');
  const minScore = scores.length ? scores[0].count : 0;
  list.innerHTML = scores.map((s, i) =>
    `<div class="score-item ${s.count === minScore ? 'lowest' : ''}">
      <span>${s.name}</span>
      <span class="score-badge">${s.count}칸</span>
    </div>`
  ).join('');
});

socket.on('bingo_alert', ({ name }) => {
  const toast = document.getElementById('bingoToast');
  toast.textContent = `🎉 ${name} 빙고!`;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
});

socket.on('game_reset', () => {
  clearedNums = new Set();
  currentNum = null;
  vsVotes = {};
  buildGrid();
  document.getElementById('questionCard').classList.remove('visible');
  document.getElementById('answerFeed').classList.remove('visible');
  document.getElementById('playerList').innerHTML = '';
  document.getElementById('scoreList').innerHTML = '';
  document.getElementById('playerCount').textContent = '0';
});

buildGrid();
</script>
</body>
</html>
