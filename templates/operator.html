<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대청부 빙고 — 운영자</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --card: #16213e;
    --accent: #e94560;
    --gold: #f5a623;
    --teal: #0f9b8e;
    --text: #eaeaea;
    --muted: #888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── 헤더 ── */
  header {
    background: var(--surface);
    padding: 16px 24px;
    border-bottom: 2px solid var(--accent);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 1.4rem; font-weight: 900; }
  header h1 span { color: var(--accent); }
  .header-info { display: flex; gap: 16px; align-items: center; }
  .player-count {
    background: var(--accent);
    padding: 6px 16px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 0.9rem;
  }

  /* ── 메인 레이아웃 ── */
  main {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 20px;
    padding: 20px;
    flex: 1;
    overflow: hidden;
  }

  /* ── 왼쪽: 번호판 ── */
  .numbers-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .numbers-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    flex: 1;
    overflow-y: auto;
  }
  .num-btn {
    aspect-ratio: 1;
    background: var(--card);
    border: 2px solid #2a2a4a;
    border-radius: 12px;
    color: var(--text);
    font-size: 1.3rem;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .num-btn:hover:not(.cleared) {
    border-color: var(--teal);
    background: #1a2a3a;
    transform: scale(1.05);
  }
  .num-btn.active {
    border-color: var(--gold);
    background: #2a1a00;
    box-shadow: 0 0 20px rgba(245,166,35,0.5);
  }
  .num-btn.cleared {
    background: #2a2a4a;
    border-color: #333;
    color: var(--muted);
    cursor: default;
    text-decoration: line-through;
  }

  /* ── 오른쪽: 질문 + 답변 ── */
  .chat-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    border: 1px solid #2a2a4a;
  }

  /* 현재 질문 */
  .question-display {
    background: var(--surface);
    border-left: 4px solid var(--gold);
    padding: 16px;
    border-radius: 8px;
  }
  .q-num { font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
  .q-text {
    font-size: 1.6rem;
    font-weight: 900;
    line-height: 1.3;
    margin-bottom: 10px;
  }
  .q-answer {
    font-size: 1.1rem;
    color: var(--teal);
    font-weight: 700;
  }
  .q-answer.hidden { display: none; }

  /* VS 투표 현황 */
  .vs-stats {
    display: none;
    gap: 12px;
  }
  .vs-stats.visible { display: flex; }
  .vs-bar {
    flex: 1;
    background: var(--surface);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .vs-bar .opt-name { font-size: 0.9rem; color: var(--muted); margin-bottom: 6px; }
  .vs-bar .opt-count { font-size: 1.8rem; font-weight: 900; color: var(--gold); }
  .vs-bar.winner { border: 2px solid var(--gold); }

  /* 룰렛 버튼 */
  .roulette-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s;
    display: none;
  }
  .roulette-btn.visible { display: block; }
  .roulette-btn:hover { opacity: 0.85; }
  .roulette-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* 답변 피드 */
  .answers-feed {
    flex: 1;
    overflow-y: auto;
    border-top: 1px solid #2a2a4a;
    padding-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .answer-item {
    background: var(--surface);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 1rem;
    animation: slideIn 0.3s ease;
  }
  .answer-name { color: var(--gold); font-weight: 700; }
  .answer-text { color: var(--text); margin-top: 4px; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 룰렛 결과 */
  .roulette-result {
    background: var(--surface);
    border: 2px solid var(--gold);
    padding: 16px;
    border-radius: 8px;
    text-align: center;
    display: none;
    animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .roulette-result.show { display: block; }
  .roulette-winner { font-size: 1.8rem; font-weight: 900; color: var(--gold); margin-bottom: 8px; }
  .roulette-choice { font-size: 1.3rem; color: var(--teal); }
  @keyframes popIn {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* 스크롤바 */
  ::-webkit-scrollbar {
    width: 6px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: #333;
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #555;
  }

  /* 대기 메시지 */
  .waiting { text-align: center; color: var(--muted); padding: 20px; }
</style>
</head>
<body>

<header>
  <h1>대청부 빙고 <span>운영자</span></h1>
  <div class="header-info">
    <div class="player-count">👥 <span id="playerCount">0</span>명</div>
  </div>
</header>

<main>
  <!-- 왼쪽: 번호판 -->
  <div class="numbers-section">
    <div class="numbers-grid" id="numbersGrid"></div>
  </div>

  <!-- 오른쪽: 질문 + 답변 채팅 -->
  <div class="chat-section">
    <!-- 현재 질문 -->
    <div class="question-display" id="questionDisplay">
      <div class="waiting">번호를 선택해주세요</div>
    </div>

    <!-- VS 투표 현황 -->
    <div class="vs-stats" id="vsStats"></div>

    <!-- 룰렛 버튼 -->
    <button class="roulette-btn" id="rouletteBtn" onclick="spinRoulette()">🎡 룰렛 시작!</button>

    <!-- 룰렛 결과 -->
    <div class="roulette-result" id="rouletteResult">
      <div class="roulette-winner" id="rouletteWinner"></div>
      <div class="roulette-choice" id="rouletteChoice"></div>
    </div>

    <!-- 답변 피드 -->
    <div class="answers-feed" id="answersFeed"></div>
  </div>
</main>

<script>
const socket = io();
const QUESTIONS = {{ questions | tojson }};

let currentNum = null;
let clearedNums = new Set();
let currentQuestion = null;

// 번호판 생성
function buildNumbers() {
  const grid = document.getElementById('numbersGrid');
  grid.innerHTML = '';
  for (let n = 1; n <= 25; n++) {
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.textContent = n;
    btn.id = `num-${n}`;
    btn.onclick = () => openQuestion(n);
    grid.appendChild(btn);
  }
}

function openQuestion(num) {
  if (clearedNums.has(num)) return;
  currentNum = num;
  socket.emit('open_question', { num });
}

function showQuestion(num, q) {
  currentQuestion = q;
  const display = document.getElementById('questionDisplay');
  const qNum = document.getElementById('num-' + num);
  
  // 활성 표시
  document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
  if (qNum) qNum.classList.add('active');

  let html = `<div class="q-num">#${num}번</div>`;
  html += `<div class="q-text">${q.text}</div>`;
  
  if (q.answer) {
    html += `<div class="q-answer">📌 정답: ${q.answer}</div>`;
  }

  display.innerHTML = html;

  // 초기화
  document.getElementById('answersFeed').innerHTML = '';
  document.getElementById('rouletteResult').classList.remove('show');
  
  // VS 투표 현황
  const vsStats = document.getElementById('vsStats');
  const rouletteBtn = document.getElementById('rouletteBtn');
  
  if (q.type === 'vs' || q.type === 'choice') {
    vsStats.classList.add('visible');
    rouletteBtn.classList.add('visible');
    vsStats.innerHTML = q.options.map(opt => 
      `<div class="vs-bar"><div class="opt-name">${opt}</div><div class="opt-count">0</div></div>`
    ).join('');
  } else {
    vsStats.classList.remove('visible');
    rouletteBtn.classList.remove('visible');
  }
}

function spinRoulette() {
  if (!currentNum) return;
  document.getElementById('rouletteBtn').disabled = true;
  socket.emit('spin_roulette', { num: currentNum });
}

// 소켓 이벤트
socket.on('question_opened', ({ num, question }) => {
  showQuestion(num, question);
});

socket.on('new_answer', ({ name, text }) => {
  const feed = document.getElementById('answersFeed');
  const item = document.createElement('div');
  item.className = 'answer-item';
  item.innerHTML = `<span class="answer-name">${name}</span><span class="answer-text">${text}</span>`;
  feed.prepend(item);
});

socket.on('vs_result', ({ votes, voters }) => {
  if (!currentQuestion || (currentQuestion.type !== 'vs' && currentQuestion.type !== 'choice')) return;
  
  const vsStats = document.getElementById('vsStats');
  const options = currentQuestion.options;
  const maxVotes = Math.max(...options.map(opt => votes[opt] || 0));
  
  vsStats.innerHTML = options.map(opt => {
    const count = votes[opt] || 0;
    const isWinner = count === maxVotes && count > 0;
    return `
      <div class="vs-bar ${isWinner ? 'winner' : ''}">
        <div class="opt-name">${opt}</div>
        <div class="opt-count">${count}</div>
      </div>
    `;
  }).join('');
});

socket.on('roulette_result', ({ winner, choice, num }) => {
  const result = document.getElementById('rouletteResult');
  document.getElementById('rouletteWinner').textContent = `🎡 ${winner}`;
  document.getElementById('rouletteChoice').textContent = `선택: ${choice}`;
  result.classList.add('show');
  document.getElementById('rouletteBtn').disabled = false;
});

socket.on('number_cleared', ({ num }) => {
  clearedNums.add(num);
  const btn = document.getElementById(`num-${num}`);
  if (btn) {
    btn.classList.remove('active');
    btn.classList.add('cleared');
  }
  currentNum = null;
});

socket.on('player_list', (players) => {
  document.getElementById('playerCount').textContent = players.length;
});

socket.on('game_reset', () => {
  clearedNums = new Set();
  currentNum = null;
  currentQuestion = null;
  buildNumbers();
  document.getElementById('questionDisplay').innerHTML = '<div class="waiting">번호를 선택해주세요</div>';
  document.getElementById('answersFeed').innerHTML = '';
  document.getElementById('rouletteResult').classList.remove('show');
  document.getElementById('playerCount').textContent = '0';
});

buildNumbers();
</script>
</body>
</html>
