<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>대청부 빙고</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --card: #16213e;
    --accent: #e94560;
    --gold: #f5a623;
    --teal: #0f9b8e;
    --text: #eaeaea;
    --muted: #888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── 입장 화면 ── */
  #joinScreen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 24px;
  }
  .join-logo {
    font-size: 2.8rem;
    font-weight: 900;
    letter-spacing: -1px;
    text-align: center;
  }
  .join-logo span { color: var(--accent); }
  .join-input {
    width: 100%;
    max-width: 280px;
    background: var(--card);
    border: 2px solid #2a2a4a;
    border-radius: 12px;
    padding: 16px;
    color: var(--text);
    font-size: 1.1rem;
    font-family: inherit;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .join-input:focus { border-color: var(--teal); }
  .join-btn {
    width: 100%;
    max-width: 280px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 1.1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .join-btn:hover { opacity: 0.85; }

  /* ── 게임 화면 ── */
  #gameScreen {
    flex: 1;
    display: none;
    flex-direction: column;
    padding: 16px;
    gap: 16px;
  }

  header {
    background: var(--surface);
    padding: 14px 16px;
    border-radius: 10px;
    border-bottom: 2px solid var(--accent);
    text-align: center;
  }
  .player-name { font-weight: 700; font-size: 1.1rem; }
  .game-title { font-size: 0.8rem; color: var(--muted); }

  /* 현재 질문 */
  #questionBanner {
    background: var(--card);
    border: 2px solid var(--gold);
    border-radius: 12px;
    padding: 16px;
    display: none;
  }
  #questionBanner.visible { display: block; }
  .q-num { font-size: 0.75rem; color: var(--gold); letter-spacing: 1px; margin-bottom: 6px; font-weight: 700; }
  .q-text { font-size: 1.4rem; font-weight: 900; line-height: 1.3; }

  /* 답변 영역 */
  #answerArea {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* VS 버튼 */
  .vs-buttons {
    display: flex;
    gap: 10px;
  }
  .vs-btn {
    flex: 1;
    padding: 18px;
    border-radius: 12px;
    border: 2px solid #2a2a4a;
    background: var(--card);
    color: var(--text);
    font-size: 1.1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .vs-btn:hover { border-color: var(--accent); }
  .vs-btn.selected { background: var(--accent); border-color: var(--accent); }

  /* 텍스트 답변 */
  .text-input-wrap {
    display: flex;
    gap: 8px;
  }
  .answer-input {
    flex: 1;
    background: var(--card);
    border: 2px solid #2a2a4a;
    border-radius: 10px;
    padding: 14px;
    color: var(--text);
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .answer-input:focus { border-color: var(--teal); }
  .send-btn {
    background: var(--teal);
    border: none;
    border-radius: 10px;
    padding: 0 18px;
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .send-btn:hover { opacity: 0.85; }

  /* 대기 메시지 */
  .waiting-msg {
    text-align: center;
    color: var(--muted);
    padding: 24px;
    font-size: 1rem;
  }

  /* 리셋 화면 */
  #resetScreen {
    flex: 1;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
  }
  .rejoin-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px 28px;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- 입장 화면 -->
<div id="joinScreen">
  <div class="join-logo">대청부<br><span>빙고</span></div>
  <input class="join-input" id="nameInput" type="text" placeholder="이름 입력" maxlength="10"
    onkeydown="if(event.key==='Enter') joinGame()">
  <button class="join-btn" onclick="joinGame()">입장하기</button>
</div>

<!-- 게임 화면 -->
<div id="gameScreen">
  <header>
    <div class="player-name" id="myName"></div>
    <div class="game-title">대청부 빙고 2026</div>
  </header>

  <div id="questionBanner">
    <div class="q-num" id="qNum"></div>
    <div class="q-text" id="qText"></div>
  </div>

  <div id="answerArea">
    <div class="waiting-msg">번호가 불릴 때까지 기다려주세요 👀</div>
  </div>
</div>

<!-- 리셋 화면 -->
<div id="resetScreen">
  <h2>게임이 초기화됐어요</h2>
  <p>운영자가 게임을 새로 시작했습니다.</p>
  <button class="rejoin-btn" onclick="showJoin()">다시 입장하기</button>
</div>

<script>
const socket = io();

let myName = '';
let currentQ = null;
let voted = false;
let answered = false;

function joinGame() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { alert('이름을 입력해주세요!'); return; }
  myName = name;
  socket.emit('join', { name });
  document.getElementById('joinScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';
  document.getElementById('myName').textContent = name;
}

function showJoin() {
  document.getElementById('resetScreen').style.display = 'none';
  document.getElementById('joinScreen').style.display = 'flex';
}

function showQuestion(num, q) {
  currentQ = { num, ...q };
  voted = false;
  answered = false;

  const banner = document.getElementById('questionBanner');
  banner.classList.add('visible');
  document.getElementById('qNum').textContent = `#${num}번`;
  document.getElementById('qText').textContent = q.text;

  const area = document.getElementById('answerArea');
  document.getElementById('answerArea').innerHTML = '';

  if (q.type === 'vs' || q.type === 'choice') {
    area.innerHTML = `<div class="vs-buttons">
      ${q.options.map(opt =>
        `<button class="vs-btn" onclick="voteVs('${opt}', this)">${opt}</button>`
      ).join('')}
    </div>`;
  } else {
    area.innerHTML = `
      <div class="text-input-wrap">
        <input class="answer-input" id="ansInput" type="text"
          placeholder="답변을 입력하세요..." maxlength="60"
          onkeydown="if(event.key==='Enter') sendAnswer()">
        <button class="send-btn" onclick="sendAnswer()">↑</button>
      </div>`;
    setTimeout(() => document.getElementById('ansInput')?.focus(), 100);
  }
}

function voteVs(option, btn) {
  if (voted) return;
  voted = true;
  document.querySelectorAll('.vs-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  socket.emit('vote_vs', { option });
}

function sendAnswer() {
  if (answered) return;
  const input = document.getElementById('ansInput');
  const text = input?.value.trim();
  if (!text) return;
  answered = true;
  socket.emit('send_answer', { text });
  input.value = '';
  input.disabled = true;
  input.placeholder = '답변 전송 완료!';
}

// 소켓 이벤트
socket.on('question_opened', ({ num, question }) => {
  showQuestion(num, question);
});

socket.on('number_cleared', ({ num }) => {
  document.getElementById('questionBanner').classList.remove('visible');
  document.getElementById('answerArea').innerHTML = '<div class="waiting-msg">번호가 불릴 때까지 기다려주세요 👀</div>';
  currentQ = null;
});

socket.on('game_reset', () => {
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('resetScreen').style.display = 'flex';
});
</script>
</body>
</html>
